name: merkmetryx-website

services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO
      branch: main
      deploy_on_push: true

    build_command: npm run build
    run_command: npm run start

    environment_slug: node-js
    instance_size_slug: basic-xxs

    http_port: 3000

    envs:
      - key: NODE_ENV
        value: production
